services:
  download:
    image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    command: ['/bin/sh', '/download.sh']
    volumes:
      - ./wwwroot:/wwwroot
      - ./download.sh:/download.sh:ro

  server:
    image: joseluisq/static-web-server:2@sha256:34bb160fd62d2145dabd0598f36352653ec58cf80a8d58c8cd2617097d34564d
    depends_on:
      download:
        condition: service_completed_successfully
    environment:
      SERVER_ROOT: /public
      SERVER_CORS_ALLOW_ORIGINS: '*'
      SERVER_CORS_ALLOW_HEADERS: 'range, if-range, origin, content-type'
    volumes:
      - ./wwwroot:/public:ro
    ports:
      - '9205:80'
