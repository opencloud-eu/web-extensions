<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      html,
      body,
      #game {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0b0f16;
      }
    </style>
  </head>

    <div id="game"></div>
    <script>
      window.EJS_DEBUG_XX = true
      window.EJS_disableAutoLang = false
      window.EJS_startOnLoaded = true;
      window.EJS_core = __EJS_CORE__
      window.EJS_gameUrl = __EJS_GAME_URL__
      window.EJS_player = '#game'
      window.EJS_paths = __EJS_PATHS__
    </script>
    <script async src="__EJS_LOADER_URL__"></script>
  </body>
</html>
