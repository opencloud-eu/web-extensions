---
when:
  - event: cron
    cron: translation-sync

variables:
  - &node_image 'quay.io/opencloudeu/nodejs-ci:24@sha256:efb3ac3e7e7180aa24fec6f6811d7a59385798676a6a7081dc092faa0800951b'
  - &git_action_plugin 'quay.io/thegeeklab/wp-git-action:2@sha256:e34e75a6cb291223e0c989c02a1977cf82d492d2e3208df97ca48f749dea4917'

steps:
  - name: translation-update
    image: *node_image
    commands:
      - make l10n-read
      - curl -o- https://raw.githubusercontent.com/transifex/cli/master/install.sh | bash
      - . ~/.profile
      - make l10n-push
      - make l10n-pull
      - rm tx
      - make l10n-write
      - make l10n-clean
      - git checkout pnpm-lock.yaml # ignore possible changes in package.lock
    environment:
      TX_TOKEN:
        from_secret: tx_token

  - name: translation-push
    image: *git_action_plugin
    settings:
      action:
        - commit
        - push
      author_email: devops@opencloud.eu
      author_name: opencloudeu
      branch: ${CI_REPO_DEFAULT_BRANCH}
      empty_commit: false
      message: '[tx] updated from transifex'
      netrc_password:
        from_secret: github_token
      netrc_username:
        from_secret: github_username
