prefer-workspace-packages: true
packages:
  - 'packages/*'
  - 'tests/*'

autoInstallPeers: true
sharedWorkspaceLockfile: true
minimumReleaseAge: 720

# public so they are picked up by IDEs
publicHoistPattern:
  - '*eslint*'

overrides:
  '@module-federation/vite': '1.18.0'

allowBuilds:
  '@parcel/watcher': true
minimumReleaseAgeExclude:
  # Renovate security update: vite@8.0.16
  - vite@8.0.16
  - '@opencloud-eu/extension-sdk@7.3.0-alpha.1'
